version: '3.8'

services:
  web:
    build: .
    container_name: shared-lists-web
    ports:
      - "127.0.0.1:3006:3000"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    networks:
      - stack_default

networks:
  stack_default:
    external: true
